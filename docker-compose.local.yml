services:
  price-feed-local:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    container_name: ausiris-price-feed-local
    restart: unless-stopped
    ports:
      - "${WEBSOCKET_PORT:-8082}:${WEBSOCKET_PORT:-8082}"
    env_file:
      - .env.local
    volumes:
      - price_feed_local_runtime:/app/runtime/local/raw-data
    depends_on:
      price-feed-local-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${WEBSOCKET_PORT:-8082}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - price-feed-local-internal
      - edge

  price-feed-local-redis:
    image: redis:7-alpine
    container_name: price-feed-local-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - price_feed_local_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - price-feed-local-internal

volumes:
  price_feed_local_runtime:
  price_feed_local_redis:

networks:
  price-feed-local-internal:
  edge:
    name: ausiris-edge
    external: true
