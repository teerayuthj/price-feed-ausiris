version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    container_name: gold-socket-app
    restart: unless-stopped
    environment:
      - SFTP_HOST=${SFTP_HOST}
      - SFTP_PORT=${SFTP_PORT:-22}
      - SFTP_USER=${SFTP_USER}
      - SFTP_PASSWORD=${SFTP_PASSWORD}
      - SFTP_REMOTE_PATH=${SFTP_REMOTE_PATH}
      - SFTP_REMOTE_PATH2=${SFTP_REMOTE_PATH2}
      - SFTP_LOCAL_PATH=/app/raw-data
      - DOWNLOAD_INTERVAL_SECONDS=${DOWNLOAD_INTERVAL_SECONDS:-1}
      - WEBSOCKET_PORT=8080
      - STATIC_DIR=/app/web/static
      - DATA_DIR=/app/raw-data
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - TZ=Asia/Bangkok
    volumes:
      - ./raw-data:/app/raw-data
    networks:
      - gold-socket-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: gold-socket-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - gold-socket-network
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    container_name: gold-socket-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data
    networks:
      - gold-socket-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:

networks:
  gold-socket-network:
    driver: bridge
