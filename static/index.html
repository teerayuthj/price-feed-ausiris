<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price & Exchange Rate Monitor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
            min-height: 100vh;
            padding: 2rem;
            font-size: 18px; /* Larger base font for TV */
            line-height: 1.6;
        }
        
        .container {
            max-width: 1920px; /* TV-friendly max width */
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .header h1 {
            font-size: 4rem; /* Much larger for TV */
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
            letter-spacing: -0.02em;
        }
        
        .header p {
            font-size: 1.5rem;
            opacity: 0.9;
            font-weight: 500;
        }
        
        .status {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 3rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        .connected { 
            background: linear-gradient(45deg, #10b981, #34d399);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        
        .disconnected { 
            background: linear-gradient(45deg, #ef4444, #f87171);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        
        .status span {
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #1e293b;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(99, 102, 241, 0.3);
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        
        .data-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.95));
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
        }
        
        .data-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.2);
        }
        
        .data-card h3 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .data-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .label {
            font-weight: 600;
            color: #64748b;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .value {
            color: #1e293b;
            font-family: 'Inter', monospace;
            font-weight: 700;
            font-size: 1.3rem;
        }
        
        .timestamp {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            font-weight: 500;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .exchange-rate {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .exchange-rate .label {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .gold-price {
            background: linear-gradient(135deg, #f59e0b 0%, #eab308 100%);
            color: #1f2937;
        }
        
        .gold-price .label {
            color: rgba(31, 41, 55, 0.8);
        }
        
        .gold-price .value {
            color: #1f2937;
        }
        
        .price-high {
            color: #10b981;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        }
        
        .price-low {
            color: #ef4444;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
        }
        
        .json-output {
            background: rgba(255, 255, 255, 0.95);
            color: #475569;
            padding: 2rem;
            border-radius: 16px;
            font-family: 'Inter', monospace;
            font-size: 14px;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            margin: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: linear-gradient(135deg, #5b56f0, #7c3aed);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* TV-specific enhancements */
        @media (min-width: 1200px) {
            body { font-size: 20px; }
            .header h1 { font-size: 5rem; }
            .section-title { font-size: 3rem; }
            .data-card h3 { font-size: 2rem; }
            .value { font-size: 1.5rem; }
        }
        
        /* Ultra-wide TV support */
        @media (min-width: 1600px) {
            .data-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .container {
                padding: 0 4rem;
            }
        }
        
        /* Animation for data updates */
        .data-update {
            animation: dataFlash 0.5s ease-in-out;
        }
        
        @keyframes dataFlash {
            0% { background-color: rgba(99, 102, 241, 0.3); }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 USD Exchange Rate Monitor</h1>
            <p>Real-time latest USD rates via API polling</p>
        </div>

        <div class="status">
            <div id="status-indicator" class="status-indicator disconnected"></div>
            <span id="status-text">Disconnected</span>
        </div>

        <div class="section">
            <div class="section-title">💰 Latest USD Exchange Rate</div>
            <div id="usd-rate" class="data-grid">
                <p>Loading...</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🏆 Gold Market Data</div>
            <div id="market-data" class="data-grid">
                <p>Loading market data...</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🔧 Controls</div>
            <button onclick="connect()">Start Polling</button>
            <button onclick="disconnect()">Stop Polling</button>
            <button onclick="fetchData()">Fetch USD Data</button>
            <button onclick="fetchMarketData()">Fetch Market Data</button>
            <button onclick="toggleJson()">Toggle JSON View</button>
            <button onclick="showManualUpdate()">Manual Update</button>
        </div>

        <div id="manual-update-section" class="section" style="display: none;">
            <div class="section-title">✏️ Manual USD Rate Update</div>
            <div style="max-width: 400px; margin: 0 auto;">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Buy Rate:</label>
                    <input type="number" id="manual-buy" step="0.01" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Sell Rate:</label>
                    <input type="number" id="manual-sell" step="0.01" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <button onclick="updateManualRate()" style="background: #ff9800;">Update Rate</button>
                <button onclick="hideManualUpdate()" style="background: #f44336;">Cancel</button>
            </div>
        </div>

        <div id="json-section" class="section" style="display: none;">
            <div class="section-title">📋 Raw JSON Data</div>
            <pre id="json-output" class="json-output"></pre>
        </div>

        <div class="timestamp" id="last-update">
            Last updated: Never
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let jsonVisible = false;
        let lastUSDData = null;
        let lastMarketData = null;

        function connect() {
            updateStatus(true);
            console.log('API polling started');
            
            // Fetch initial data
            fetchData();
            fetchMarketData();
            
            // Start auto-refresh every 5 seconds
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => {
                fetchDataSilently();
                fetchMarketDataSilently();
            }, 5000);
        }

        function disconnect() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            updateStatus(false);
            console.log('API polling stopped');
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('status-indicator');
            const text = document.getElementById('status-text');
            
            if (connected) {
                indicator.className = 'status-indicator connected';
                text.textContent = 'API Polling Active';
            } else {
                indicator.className = 'status-indicator disconnected';
                text.textContent = 'API Polling Stopped';
            }
        }

        function updateDisplay(data) {
            updateUSDRate(data);
            
            const timestamp = new Date(data.timestamp);
            document.getElementById('last-update').textContent = 
                `Last updated: ${timestamp.toLocaleString()}`;
        }

        function updateMarketData(data, animate = false) {
            const container = document.getElementById('market-data');
            
            if (!data) {
                container.innerHTML = '<p>No market data available</p>';
                return;
            }

            // Check if this is initial load or if container is empty
            const isInitialLoad = !container.querySelector('.data-card');
            
            if (isInitialLoad) {
                // Full render for initial load
                renderMarketDataFull(data, container);
            } else {
                // Smart update only changed values
                updateMarketDataValues(data, animate);
            }
        }

        function renderMarketDataFull(data, container) {
            const marketStatusColor = data.market_status === 'open' ? '#10b981' : '#ef4444';
            const sourceColor = data.source === 'manual' ? '#f59e0b' : '#6366f1';

            container.innerHTML = `
                <div class="data-card gold-price" id="spot-usd-card">
                    <h3 style="margin-top: 0;">💵 Spot USD</h3>
                    <div class="data-row">
                        <span class="label">Bid:</span>
                        <span class="value price-high" id="spot-bid">${data.spot_usd.bid.toFixed(2)} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Offer:</span>
                        <span class="value price-low" id="spot-offer">${data.spot_usd.offer.toFixed(2)} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Spread:</span>
                        <span class="value" id="spot-spread">${(data.spot_usd.offer - data.spot_usd.bid).toFixed(2)} ฿</span>
                    </div>
                </div>
                
                <div class="data-card gold-price" id="g965b-card">
                    <h3 style="margin-top: 0;">🥇 G965B Retail</h3>
                    <div class="data-row">
                        <span class="label">Bid:</span>
                        <span class="value price-high" id="g965b-bid">${data.g965b_retail.bid.toLocaleString()} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Offer:</span>
                        <span class="value price-low" id="g965b-offer">${data.g965b_retail.offer.toLocaleString()} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Spread:</span>
                        <span class="value" id="g965b-spread">${(data.g965b_retail.offer - data.g965b_retail.bid).toLocaleString()} ฿</span>
                    </div>
                </div>
                
                <div class="data-card gold-price" id="g9999kg-card">
                    <h3 style="margin-top: 0;">🏗️ G9999KG Retail</h3>
                    <div class="data-row">
                        <span class="label">Bid:</span>
                        <span class="value price-high" id="g9999kg-bid">${data.g9999kg_retail.bid.toLocaleString()} ฿/KG</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Offer:</span>
                        <span class="value price-low" id="g9999kg-offer">${data.g9999kg_retail.offer.toLocaleString()} ฿/KG</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Spread:</span>
                        <span class="value" id="g9999kg-spread">${(data.g9999kg_retail.offer - data.g9999kg_retail.bid).toLocaleString()} ฿/KG</span>
                    </div>
                </div>
                
                <div class="data-card gold-price" id="g9999g-card">
                    <h3 style="margin-top: 0;">⚜️ G9999G</h3>
                    <div class="data-row">
                        <span class="label">Bid:</span>
                        <span class="value price-high" id="g9999g-bid">${data.g9999g.bid.toLocaleString()} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Offer:</span>
                        <span class="value price-low" id="g9999g-offer">${data.g9999g.offer.toLocaleString()} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Spread:</span>
                        <span class="value" id="g9999g-spread">${(data.g9999g.offer - data.g9999g.bid).toLocaleString()} ฿</span>
                    </div>
                </div>
                
                <div class="data-card" id="status-card" style="grid-column: 1 / -1; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white;">
                    <div class="data-row">
                        <span class="label">Time:</span>
                        <span class="value" id="market-time">${data.time}</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Market Status:</span>
                        <span class="value" id="market-status" style="color: ${marketStatusColor}; font-weight: bold;">${data.market_status.toUpperCase()}</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Source:</span>
                        <span class="value" id="market-source" style="color: ${sourceColor}; font-weight: bold;">${data.source.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }

        function updateMarketDataValues(data, animate) {
            // Update only if values changed
            updateValueIfChanged('spot-bid', data.spot_usd.bid.toFixed(2) + ' ฿', animate);
            updateValueIfChanged('spot-offer', data.spot_usd.offer.toFixed(2) + ' ฿', animate);
            updateValueIfChanged('spot-spread', (data.spot_usd.offer - data.spot_usd.bid).toFixed(2) + ' ฿', animate);
            
            updateValueIfChanged('g965b-bid', data.g965b_retail.bid.toLocaleString() + ' ฿', animate);
            updateValueIfChanged('g965b-offer', data.g965b_retail.offer.toLocaleString() + ' ฿', animate);
            updateValueIfChanged('g965b-spread', (data.g965b_retail.offer - data.g965b_retail.bid).toLocaleString() + ' ฿', animate);
            
            updateValueIfChanged('g9999kg-bid', data.g9999kg_retail.bid.toLocaleString() + ' ฿/KG', animate);
            updateValueIfChanged('g9999kg-offer', data.g9999kg_retail.offer.toLocaleString() + ' ฿/KG', animate);
            updateValueIfChanged('g9999kg-spread', (data.g9999kg_retail.offer - data.g9999kg_retail.bid).toLocaleString() + ' ฿/KG', animate);
            
            updateValueIfChanged('g9999g-bid', data.g9999g.bid.toLocaleString() + ' ฿', animate);
            updateValueIfChanged('g9999g-offer', data.g9999g.offer.toLocaleString() + ' ฿', animate);
            updateValueIfChanged('g9999g-spread', (data.g9999g.offer - data.g9999g.bid).toLocaleString() + ' ฿', animate);
            
            updateValueIfChanged('market-time', data.time, animate);
            updateValueIfChanged('market-status', data.market_status.toUpperCase(), animate);
            updateValueIfChanged('market-source', data.source.toUpperCase(), animate);
        }

        function updateValueIfChanged(elementId, newValue, animate) {
            const element = document.getElementById(elementId);
            if (element && element.textContent !== newValue) {
                element.textContent = newValue;
                if (animate) {
                    element.classList.add('data-update');
                    setTimeout(() => element.classList.remove('data-update'), 500);
                }
            }
        }

        function updateUSDRate(rate) {
            const container = document.getElementById('usd-rate');
            
            if (!rate) {
                container.innerHTML = '<p>No USD rate data available</p>';
                return;
            }

            const marketStatusColor = rate.market_status === 'open' ? '#4CAF50' : '#f44336';
            const sourceColor = rate.source === 'manual' ? '#ff9800' : '#2196F3';

            container.innerHTML = `
                <div class="data-card exchange-rate" style="max-width: 600px; margin: 0 auto;">
                    <div class="data-row">
                        <span class="label">Time:</span>
                        <span class="value">${rate.time}</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Currency:</span>
                        <span class="value">${rate.currency}</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Buy Rate:</span>
                        <span class="value price-high" style="font-size: 1.2em; font-weight: bold;">${rate.buy.toFixed(2)} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Sell Rate:</span>
                        <span class="value price-low" style="font-size: 1.2em; font-weight: bold;">${rate.sell.toFixed(2)} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Spread:</span>
                        <span class="value">${(rate.sell - rate.buy).toFixed(2)} ฿</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Market Status:</span>
                        <span class="value" style="color: ${marketStatusColor}; font-weight: bold;">${rate.market_status.toUpperCase()}</span>
                    </div>
                    <div class="data-row">
                        <span class="label">Source:</span>
                        <span class="value" style="color: ${sourceColor}; font-weight: bold;">${rate.source.toUpperCase()}</span>
                    </div>
                </div>
            `;
        }

        function updateJsonOutput(data) {
            document.getElementById('json-output').textContent = 
                JSON.stringify(data, null, 2);
        }

        function toggleJson() {
            const section = document.getElementById('json-section');
            jsonVisible = !jsonVisible;
            section.style.display = jsonVisible ? 'block' : 'none';
        }

        function showManualUpdate() {
            document.getElementById('manual-update-section').style.display = 'block';
        }

        function hideManualUpdate() {
            document.getElementById('manual-update-section').style.display = 'none';
        }

        async function updateManualRate() {
            const buy = parseFloat(document.getElementById('manual-buy').value);
            const sell = parseFloat(document.getElementById('manual-sell').value);

            if (!buy || !sell || buy <= 0 || sell <= 0) {
                alert('Please enter valid buy and sell rates');
                return;
            }

            if (buy >= sell) {
                alert('Buy rate should be lower than sell rate');
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/update-rate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ buy, sell })
                });

                if (response.ok) {
                    alert('USD rate updated successfully!');
                    hideManualUpdate();
                    // Clear inputs
                    document.getElementById('manual-buy').value = '';
                    document.getElementById('manual-sell').value = '';
                } else {
                    const errorData = await response.text();
                    alert('Error updating rate: ' + errorData);
                }
            } catch (error) {
                console.error('Error updating rate:', error);
                alert('Error updating rate: ' + error.message);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('http://localhost:8080/api/data');
                const data = await response.json();
                updateDisplay(data);
                updateJsonOutput(data);
            } catch (error) {
                console.error('Error fetching USD rate:', error);
            }
        }

        async function fetchMarketData() {
            try {
                const response = await fetch('http://localhost:8080/api/market-data');
                const data = await response.json();
                updateMarketData(data);
                updateJsonOutput(data);
                
                const timestamp = new Date(data.timestamp);
                document.getElementById('last-update').textContent = 
                    `Last updated: ${timestamp.toLocaleString()}`;
            } catch (error) {
                console.error('Error fetching market data:', error);
                document.getElementById('market-data').innerHTML = '<p>Error loading market data</p>';
            }
        }

        // Silent fetch functions for polling (no console errors, no DOM updates on error)
        async function fetchDataSilently() {
            try {
                const response = await fetch('http://localhost:8080/api/data');
                const data = await response.json();
                
                // Only update if data actually changed
                if (!lastUSDData || JSON.stringify(lastUSDData) !== JSON.stringify(data)) {
                    lastUSDData = data;
                    updateDisplay(data);
                    updateJsonOutput(data);
                }
            } catch (error) {
                // Silent fail for polling
            }
        }

        async function fetchMarketDataSilently() {
            try {
                const response = await fetch('http://localhost:8080/api/market-data');
                const data = await response.json();
                
                // Only update if data actually changed
                if (!lastMarketData || JSON.stringify(lastMarketData) !== JSON.stringify(data)) {
                    lastMarketData = data;
                    updateMarketData(data, true); // Enable animation for silent updates
                    updateJsonOutput(data);
                    
                    const timestamp = new Date(data.timestamp);
                    document.getElementById('last-update').textContent = 
                        `Last updated: ${timestamp.toLocaleString()}`;
                }
            } catch (error) {
                // Silent fail for polling
            }
        }

        // Auto-start API polling on page load
        window.onload = function() {
            connect(); // This will start API polling
        };

        // Resume polling when page becomes visible
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && !autoRefreshInterval) {
                setTimeout(connect, 1000);
            }
        });
    </script>
</body>
</html>
